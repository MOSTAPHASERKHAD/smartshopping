<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Shopping</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#fafafa;--card:#fff;--text:#111;--text2:#6b6b6b;--border:#e8e8e8;--border2:#ddd;
  --accent:#1a1a2e;--sale:#e94560;--sale-hover:#d63050;--success:#22c55e;
  --shadow:0 2px 8px rgba(0,0,0,.06);--radius:12px;--max-w:1200px;
  --font:'Inter','Cairo',sans-serif
}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--card);color:var(--text);line-height:1.5;-webkit-font-smoothing:antialiased}
body.ltr{direction:ltr;text-align:left}
body.rtl{direction:rtl;text-align:right}
.container{max-width:var(--max-w);margin:0 auto;padding:0 20px}

/* Announcement bar */
.announcement{background:var(--accent);color:rgba(255,255,255,.85);text-align:center;padding:7px 16px;font-size:.72rem;font-weight:500;display:flex;align-items:center;justify-content:center;gap:6px}

/* Header */
header{background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.header-inner{display:flex;align-items:center;justify-content:space-between;height:60px;gap:12px}
.logo{font-size:1.2rem;font-weight:800;text-decoration:none;color:var(--text);display:flex;align-items:center;gap:6px;letter-spacing:-.3px}
.logo span{color:var(--sale)}
.search-bar{flex:1;max-width:360px;position:relative}
.search-bar input{width:100%;padding:9px 14px;border:1px solid var(--border);border-radius:8px;font-family:var(--font);font-size:.82rem;outline:none;transition:border .15s;background:var(--bg)}
.search-bar input:focus{border-color:var(--text)}
.header-actions{display:flex;align-items:center;gap:2px}
.icon-btn{width:38px;height:38px;border:none;border-radius:8px;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;color:var(--text)}
.icon-btn:hover{background:var(--bg)}
.icon-btn .badge{position:absolute;top:3px;right:3px;background:var(--sale);color:#fff;border-radius:50%;width:17px;height:17px;font-size:.55rem;font-weight:700;display:flex;align-items:center;justify-content:center}
.lang-btn{padding:0 10px;width:auto;font-size:.72rem;font-weight:700;border-radius:6px}

/* Hero */
.hero{background:#f5f5f5;padding:48px 0;text-align:center}
.hero h1{font-size:2rem;font-weight:800;margin-bottom:6px}
.hero p{font-size:.95rem;color:var(--text2);max-width:500px;margin:0 auto}

/* Products */
section{padding:40px 0}
.products-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.products-header h2{font-size:1.1rem;font-weight:700}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px}
.product-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:box-shadow .25s}
.product-card:hover{box-shadow:var(--shadow)}
.product-image-wrap{position:relative;aspect-ratio:1;background:#f7f7f7;overflow:hidden}
.product-image{width:100%;height:100%;object-fit:cover;transition:transform .35s}
.product-card:hover .product-image{transform:scale(1.04)}
.product-badge{position:absolute;top:10px;right:10px;background:var(--sale);color:#fff;font-size:.65rem;font-weight:700;padding:3px 8px;border-radius:4px;z-index:2;letter-spacing:.3px}
.product-body{padding:14px 14px 16px}
.product-title{font-size:.88rem;font-weight:600;margin-bottom:4px;line-height:1.35}
.product-price{display:flex;align-items:baseline;gap:7px;margin-bottom:10px}
.price-current{font-size:1rem;font-weight:700;color:var(--sale)}
.price-old{font-size:.78rem;color:var(--text2);text-decoration:line-through}
.product-action{width:100%}
.btn-add{width:100%;padding:9px;border:1px solid var(--border2);border-radius:8px;background:transparent;cursor:pointer;font-family:var(--font);font-size:.8rem;font-weight:600;transition:all .2s}
.btn-add:hover{border-color:var(--text);background:var(--text);color:#fff}
.btn-add:disabled{opacity:.4;cursor:not-allowed;border-color:var(--border)}
.btn-add:disabled:hover{background:transparent;color:inherit}
.qty-inline{display:inline-flex;align-items:center;gap:0;border:1px solid var(--border2);border-radius:8px;overflow:hidden}
.qty-inline button{width:30px;height:34px;border:none;background:transparent;cursor:pointer;font-size:.9rem;font-weight:600;transition:background .12s}
.qty-inline button:hover{background:var(--bg)}
.qty-inline input{width:34px;text-align:center;font-weight:600;font-size:.8rem;border:none;background:transparent;font-family:var(--font);pointer-events:none}

/* Cart Drawer */
.cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;opacity:0;visibility:hidden;transition:all .3s}
.cart-overlay.open{opacity:1;visibility:visible}
.cart-drawer{position:fixed;top:0;left:0;width:400px;max-width:100vw;height:100%;background:var(--card);z-index:201;transform:translateX(-100%);transition:transform .3s;display:flex;flex-direction:column}
body.ltr .cart-drawer{left:auto;right:0;transform:translateX(100%)}
body.ltr .cart-drawer.open{transform:translateX(0)}
body.rtl .cart-drawer.open{transform:translateX(0)}
.cart-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)}
.cart-header h3{font-size:.95rem;font-weight:700}
.cart-header .count{color:var(--text2);font-weight:400;font-size:.8rem}
.cart-close{width:32px;height:32px;border:none;border-radius:50%;background:transparent;cursor:pointer;font-size:1.2rem;display:flex;align-items:center;justify-content:center;transition:background .15s}
.cart-close:hover{background:var(--bg)}
.cart-items{flex:1;overflow-y:auto;padding:8px 20px}
.cart-empty{padding:60px 20px;text-align:center;color:var(--text2);font-size:.85rem}
.cart-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--border)}
.cart-item-img{width:64px;height:64px;object-fit:cover;border-radius:8px;background:#f0f0f0;flex-shrink:0}
.cart-item-info{flex:1;min-width:0}
.cart-item-title{font-weight:600;font-size:.82rem;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cart-item-price{color:var(--text2);font-size:.78rem}
.cart-item-bottom{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.cart-item-total{font-weight:700;font-size:.85rem}
.cart-item-remove{color:var(--text2);cursor:pointer;font-size:.68rem;padding:2px 4px;transition:color .15s}
.cart-item-remove:hover{color:var(--sale)}
.cart-footer{padding:16px 20px 20px;border-top:1px solid var(--border)}
.cart-discount{margin-bottom:10px}
.cart-discount input{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-family:var(--font);font-size:.8rem;outline:none}
.cart-subtotal{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cart-subtotal-label{font-size:.82rem;color:var(--text2)}
.cart-subtotal-value{font-size:1.1rem;font-weight:800}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 20px;border:none;border-radius:8px;font-family:var(--font);font-weight:600;font-size:.85rem;cursor:pointer;transition:all .2s;text-decoration:none}
.btn-primary{background:var(--text);color:#fff}
.btn-primary:hover{opacity:.85}
.btn-sale{background:var(--sale);color:#fff}
.btn-sale:hover{background:var(--sale-hover)}
.btn-block{width:100%}
.btn-lg{padding:13px 24px;font-size:.9rem}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* Checkout Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;visibility:hidden;transition:all .25s;padding:16px}
.modal-overlay.open{opacity:1;visibility:visible}
.modal{background:var(--card);border-radius:var(--radius);width:480px;max-width:100%;max-height:90vh;overflow-y:auto;position:relative}
.modal-header{padding:18px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h2{font-size:1rem;font-weight:700}
.modal-close-btn{width:30px;height:30px;border:none;border-radius:6px;background:var(--bg);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:background .15s}
.modal-close-btn:hover{background:var(--border)}
.modal-body{padding:20px 24px 24px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.78rem;font-weight:600;margin-bottom:4px;color:var(--text2);text-transform:uppercase;letter-spacing:.3px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:6px;font-family:var(--font);font-size:.85rem;outline:none;transition:border .15s;background:var(--bg);color:var(--text)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--text)}
.form-group textarea{resize:vertical;min-height:60px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.delivery-note{background:#fef3c7;border:1px solid #fcd34d;border-radius:6px;padding:10px 12px;margin-bottom:14px;font-size:.78rem;color:#92400e;display:flex;gap:6px;align-items:flex-start}
.summary-box{background:var(--bg);border-radius:8px;padding:14px;margin-bottom:14px}
.summary-line{display:flex;justify-content:space-between;font-size:.82rem;padding:4px 0}
.summary-total{font-weight:700;border-top:1px solid var(--border);padding-top:8px;margin-top:4px;font-size:.9rem}

/* Success */
.success-wrap{text-align:center;padding:40px 20px}
.success-icon{width:48px;height:48px;border-radius:50%;background:#dcfce7;color:var(--success);display:flex;align-items:center;justify-content:center;font-size:1.3rem;margin:0 auto 14px}
.success-wrap h2{font-size:1.1rem;font-weight:800;margin-bottom:4px;color:var(--success)}
.success-order{font-size:1.3rem;font-weight:800;margin:10px 0;background:var(--bg);padding:8px 20px;border-radius:6px;display:inline-block;letter-spacing:.5px}
.wa-btn{display:inline-flex;align-items:center;gap:6px;background:#25d366;color:#fff;padding:11px 24px;border-radius:50px;text-decoration:none;font-weight:700;font-size:.85rem;margin-top:14px;transition:background .2s}
.wa-btn:hover{background:#1da851}

/* Track */
.track-wrap{max-width:480px;margin:0 auto}
.track-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.track-form{display:flex;gap:6px;margin-bottom:14px}
.track-form input{flex:1;padding:10px 12px;border:1px solid var(--border);border-radius:6px;font-family:var(--font);font-size:.85rem;outline:none}
.track-form input:focus{border-color:var(--text)}
.track-result{padding:14px;border-radius:8px;background:var(--bg)}
.track-result h4{font-weight:700;font-size:.85rem;margin-bottom:6px}
.track-status{display:inline-block;padding:2px 10px;border-radius:50px;font-size:.7rem;font-weight:700}
.track-status.pending{background:#fef3c7;color:#92400e}
.track-status.confirmed{background:#dcfce7;color:#166534}
.track-status.shipped{background:#dbeafe;color:#1e40af}
.track-status.delivered{background:#e0f2fe;color:#0e7490}
.track-info{font-size:.8rem;color:var(--text2);margin-top:3px}

/* Footer */
footer{background:var(--accent);color:rgba(255,255,255,.6);padding:36px 0 28px;margin-top:40px}
.footer-inner{display:grid;grid-template-columns:2fr 1fr 1fr;gap:32px}
.footer-brand .logo{color:#fff;margin-bottom:6px;font-size:1.1rem}
.footer-brand p{font-size:.8rem;line-height:1.6;max-width:280px}
.footer h4{color:#fff;font-weight:700;font-size:.8rem;margin-bottom:10px;text-transform:uppercase;letter-spacing:.3px}
.footer a{color:rgba(255,255,255,.6);text-decoration:none;display:block;font-size:.8rem;padding:2px 0;transition:color .15s}
.footer a:hover{color:#fff}
.footer-bottom{border-top:1px solid rgba(255,255,255,.07);padding-top:16px;margin-top:24px;text-align:center;font-size:.75rem}

/* Loading */
.loading{text-align:center;padding:60px 0;grid-column:1/-1}
.spinner{width:28px;height:28px;border:2.5px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}

.fade-in{animation:fadeIn .35s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.hidden{display:none!important}

/* Product Detail Section (inline, not overlay) */
#productDetailSection{background:var(--bg);padding:32px 0 48px}
.back-link{display:inline-flex;align-items:center;gap:4px;color:var(--text2);text-decoration:none;font-size:.8rem;font-weight:500;margin-bottom:20px;transition:color .15s}
.back-link:hover{color:var(--text)}
.pdetail-layout{display:grid;grid-template-columns:1fr 1fr;gap:32px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.pdetail-img{background:#f7f7f7;min-height:300px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.pdetail-img img{width:100%;height:100%;object-fit:cover;display:block}
.pdetail-info{padding:28px 28px 28px 0}
body.ltr .pdetail-info{padding:28px 0 28px 28px}
.pdetail-info h2{font-size:1.25rem;font-weight:800;margin-bottom:6px}
.pdetail-info .pd-price{font-size:1.3rem;font-weight:800;color:var(--sale);margin-bottom:4px}
.pdetail-info .pd-price .pd-old{font-size:.85rem;color:var(--text2);text-decoration:line-through;font-weight:400;margin-right:6px}
.pdetail-info .pd-desc{font-size:.82rem;color:var(--text2);line-height:1.7;margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.pdetail-info .pd-form-title{font-size:.85rem;font-weight:700;margin-bottom:14px}
.pdetail-info .pd-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pdetail-info .pd-group{margin-bottom:12px}
.pdetail-info .pd-group label{display:block;font-size:.72rem;font-weight:600;margin-bottom:3px;color:var(--text2);text-transform:uppercase;letter-spacing:.3px}
.pdetail-info .pd-group input,.pdetail-info .pd-group select,.pdetail-info .pd-group textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:6px;font-family:var(--font);font-size:.85rem;outline:none;transition:border .15s;background:var(--bg);color:var(--text)}
.pdetail-info .pd-group input:focus,.pdetail-info .pd-group select:focus,.pdetail-info .pd-group textarea:focus{border-color:var(--text)}
.pdetail-info .pd-group textarea{resize:vertical;min-height:55px}
.pdetail-info .pd-note{background:#fef3c7;border:1px solid #fcd34d;border-radius:6px;padding:9px 11px;margin-bottom:14px;font-size:.75rem;color:#92400e;display:flex;gap:5px;align-items:flex-start}
.pdetail-info .pd-success{text-align:center;padding:30px 0}
.pdetail-info .pd-success .pd-check{width:48px;height:48px;border-radius:50%;background:#dcfce7;color:var(--success);display:flex;align-items:center;justify-content:center;font-size:1.3rem;margin:0 auto 14px}
.pdetail-info .pd-success h3{font-weight:800;font-size:1.1rem;color:var(--success);margin-bottom:4px}
.pdetail-info .pd-success .pd-id{font-size:1.3rem;font-weight:800;margin:10px 0;background:var(--bg);padding:8px 20px;border-radius:6px;display:inline-block;letter-spacing:.5px}

@media(max-width:768px){
  .pdetail-layout{grid-template-columns:1fr}
  .pdetail-img{min-height:200px;max-height:260px}
  .pdetail-info{padding:20px}
  body.ltr .pdetail-info{padding:20px}
  .pdetail-info .pd-row{grid-template-columns:1fr}
}

.product-title a{color:inherit;text-decoration:none}
.product-title a:hover{color:var(--sale)}
.product-actions{display:flex;gap:6px;margin-top:8px}
.product-actions .btn-add{flex:1}
.btn-qorder{padding:9px 14px;border:1px solid var(--sale);border-radius:8px;background:transparent;color:var(--sale);cursor:pointer;font-family:var(--font);font-size:.78rem;font-weight:600;transition:all .2s;white-space:nowrap}
.btn-qorder:hover{background:var(--sale);color:#fff}
.buy-now{background:var(--sale)!important;color:#fff!important;border-color:var(--sale)!important}
.buy-now:hover{opacity:.85!important}

/* Category & Sort */
.cat-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;align-items:center}
.cat-btn{padding:5px 14px;border:1px solid var(--border);border-radius:50px;background:transparent;cursor:pointer;font-family:var(--font);font-size:.78rem;font-weight:600;transition:all .2s;color:var(--text2)}
.cat-btn:hover{border-color:var(--text);color:var(--text)}
.cat-btn.active{background:var(--text);color:#fff;border-color:var(--text)}
.sort-select{padding:5px 10px;border:1px solid var(--border);border-radius:50px;font-family:var(--font);font-size:.78rem;outline:none;background:transparent;color:var(--text2);cursor:pointer;margin-right:auto}

@media(max-width:768px){
  .hero{padding:32px 0}
  .hero h1{font-size:1.5rem}
  .products-grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}
  .product-body{padding:10px 10px 12px}
  .product-title{font-size:.8rem}
  .search-bar{display:none}
  .header-inner{height:52px}
  .cart-drawer{width:100%}
  .modal-body{padding:16px}
  .form-row{grid-template-columns:1fr}
  .footer-inner{grid-template-columns:1fr;gap:20px}
  section{padding:28px 0}
  .cat-bar{overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px}
  .cat-btn{white-space:nowrap;font-size:.72rem;padding:4px 10px}
  .sort-select{font-size:.72rem;padding:4px 8px}
}
@media(max-width:480px){
  .products-grid{grid-template-columns:1fr 1fr;gap:8px}
}
</style>
</head>
<body class="rtl">

<div class="announcement" data-i18n="announce">🇩🇿 الدفع عند الاستلام — التوصيل لجميع ولايات الجزائر</div>

<header>
<div class="container header-inner">
  <a href="#" class="logo">Smart <span>Shopping</span></a>
  <div class="search-bar">
    <input type="text" id="searchInput" data-i18n-placeholder="search" placeholder="ابحث عن منتج..." oninput="filterProducts()">
  </div>
  <div class="header-actions">
    <button class="icon-btn lang-btn" id="langToggle" onclick="toggleLang()">EN</button>
    <button class="icon-btn" onclick="openCart()" style="position:relative">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span class="badge" id="cartCount">0</span>
    </button>
  </div>
</div>
</header>

<section class="hero">
<div class="container">
  <h1 data-i18n="hero_title">تسوّق بذكاء</h1>
  <p data-i18n="hero_sub">منتجات متنوعة بأفضل الأسعار — الدفع عند الاستلام</p>
</div>
</section>

<section id="products">
<div class="container">
  <div class="products-header">
    <h2 data-i18n="products_title">المنتجات</h2>
    <a href="#track-section" style="font-size:.8rem;color:var(--text2);text-decoration:none" data-i18n="track_link">تتبع طلبك ←</a>
  </div>
  <div class="cat-bar" id="categoryBar">
    <button class="cat-btn active" data-cat="" onclick="filterByCategory(this)"><span data-i18n="cat_all">الكل</span></button>
    <select class="sort-select" id="sortSelect" onchange="filterProducts()">
      <option value="default" data-i18n="sort_default">الأحدث</option>
      <option value="price-asc" data-i18n="sort_price_asc">السعر: من الأقل</option>
      <option value="price-desc" data-i18n="sort_price_desc">السعر: من الأعلى</option>
      <option value="name" data-i18n="sort_name">الاسم</option>
    </select>
  </div>
  <div id="productsGrid" class="products-grid">
    <div class="loading"><div class="spinner"></div><p data-i18n="loading">جاري التحميل...</p></div>
  </div>
</div>
</section>

<!-- Product Detail Page (inline) -->
<section id="productDetailSection" class="hidden">
<div class="container">
  <a href="#" class="back-link" onclick="hideProductDetail();return false" data-i18n="back_products">← العودة للمنتجات</a>
  <div class="pdetail-layout">
    <div class="pdetail-img" id="pdImage">
      <div style="color:var(--text2);font-size:.85rem;text-align:center;padding:40px" data-i18n="loading">جاري التحميل...</div>
    </div>
    <div class="pdetail-info">
      <h2 id="pdTitle"></h2>
      <div class="pd-price" id="pdPrice"></div>
      <div class="pd-desc" id="pdDesc"></div>
      <div class="pd-form-title" data-i18n="order_info">معلومات الطلب</div>
      <form id="pdForm" onsubmit="submitProductDetail(event)">
        <input type="hidden" id="pdProductId">
        <div class="pd-row">
          <div class="pd-group">

function t(key){return (I18N[currentLang]||I18N.ar)[key]||key}

function setLang(lang){
  currentLang=lang;localStorage.setItem(LANG_KEY,lang);
  var isAr=lang==='ar';
  document.body.className=isAr?'rtl':'ltr';
  document.documentElement.lang=lang;document.documentElement.dir=isAr?'rtl':'ltr';
  document.getElementById('langToggle').textContent=isAr?'EN':'AR';
  document.querySelectorAll('[data-i18n]').forEach(function(el){el.textContent=t(el.getAttribute('data-i18n'))});
  document.querySelectorAll('[data-i18n-placeholder]').forEach(function(el){el.placeholder=t(el.getAttribute('data-i18n-placeholder'))});
  try{
    renderProducts();renderCart();
    if(allProducts.length)buildCategories();
  }catch(e){console.error('setLang err',e)}
}
function toggleLang(){try{setLang(currentLang==='ar'?'en':'ar')}catch(e){console.error('toggleLang',e)}}

function apiCall(action,params,callback){
  var url=API_URL+'?action='+action;
  if(params){for(var k in params){url+='&'+encodeURIComponent(k)+'='+encodeURIComponent(params[k])}}
  var cb='cb_'+Date.now()+'_'+Math.floor(Math.random()*9999);
  var full=url+'&callback='+cb;var called=false;
  window[cb]=function(d){if(called)return;called=true;delete window[cb];document.head.removeChild(s);callback(d)};
  var s=document.createElement('script');s.src=full;
  s.onerror=function(){if(called)return;called=true;delete window[cb];callback({error:'Network error'})};
  document.head.appendChild(s);
  setTimeout(function(){if(!called){called=true;delete window[cb];document.head.removeChild(s);callback({error:'Timeout'})}},15000);
}

function init(){
  try{setLang(currentLang)}catch(e){console.error('init setLang',e)}
  apiCall('settings',{},function(d){if(!d||d.error)return;storeSettings=d;
    var n=currentLang==='ar'?d.store_name_ar:d.store_name_en;
    if(n){document.querySelector('.logo').innerHTML=n.replace(/Smart\s*/i,'Smart <span>Shopping</span>')}
    if(d.phone){document.querySelectorAll('a[href*="wa.me"]').forEach(function(a){a.href='https://wa.me/'+d.phone})}
  });
  apiCall('catalog',{},function(d){
    try{
      if(!d||d.error||!d.products){document.getElementById('productsGrid').innerHTML='<p style="text-align:center;padding:40px;color:var(--text2);grid-column:1/-1">'+t('no_results')+'</p>';return}
      allProducts=d.products;buildCategories();renderProducts();
    }catch(e){console.error('catalog err',e)}
  });
}

var activeCategory='';

function renderProducts(){
  var grid=document.getElementById('productsGrid');
  var q=(document.getElementById('searchInput').value||'').toLowerCase();
  var sortEl=document.getElementById('sortSelect');
  var sort=sortEl?sortEl.value:'default';

  var f=allProducts.filter(function(p){
    if(!p)return false;
    if(activeCategory){
      var pc=(currentLang==='ar'?p.category_ar:p.category_en||p.category_ar||'').toLowerCase();
      if(pc!==activeCategory)return false;
    }
    var t=(currentLang==='ar'?p.title_ar:p.title_en||p.title_ar||'').toLowerCase();
    var c=(currentLang==='ar'?p.category_ar:p.category_en||p.category_ar||'').toLowerCase();
    return t.indexOf(q)>-1||c.indexOf(q)>-1;
  });

  if(sort==='price-asc'){f.sort(function(a,b){return a.price-b.price})}
  else if(sort==='price-desc'){f.sort(function(a,b){return b.price-a.price})}
  else if(sort==='name'){
    f.sort(function(a,b){
      var an=(currentLang==='ar'?a.title_ar:a.title_en||a.title_ar||'');
      var bn=(currentLang==='ar'?b.title_ar:b.title_en||b.title_ar||'');
      return an.localeCompare(bn);
    });
  }

  if(!f.length){grid.innerHTML='<p style="text-align:center;padding:40px;color:var(--text2);grid-column:1/-1">'+t('no_results')+'</p>';return}
  grid.innerHTML=f.map(function(p,i){
    var inCart=cart.find(function(c){return c.id===p.id});
    var qty=inCart?inCart.qty:0;var out=p.stock<=0;var disc=p.old_price>0;
    var img=p.image1||'<svg xmlns="http://www.w3.org/2000/svg" width="300" height="300" fill="%23f5f5f5"><rect width="300" height="300"/></svg>';
    return '<div class="product-card fade-in" style="animation-delay:'+i*40+'ms">'+
      '<div class="product-image-wrap">'+
        '<img class="product-image" src="'+img+'" alt="'+(p.title_ar||'')+'" loading="lazy" onerror="this.src=\'data:image/svg+xml,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;300&quot; height=&quot;300&quot; fill=&quot;%23f5f5f5&quot;><rect width=&quot;300&quot; height=&quot;300&quot;/></svg>\'">'+
        (disc?'<span class="product-badge">-'+Math.round((p.old_price-p.price)/p.old_price*100)+'%</span>':'')+
        (out&&!disc?'<span class="product-badge" style="background:#6b7280">'+t('out_of_stock')+'</span>':'')+
      '</div>'+
      '<div class="product-body">'+
        '<div class="product-title"><a href="#" onclick="showProductDetail(\''+p.id+'\');return false">'+(currentLang==='ar'?p.title_ar:p.title_en||p.title_ar)+'</a></div>'+
        '<div class="product-price">'+
          '<span class="price-current">'+Number(p.price).toLocaleString()+' '+t('currency')+'</span>'+
          (disc?'<span class="price-old">'+Number(p.old_price).toLocaleString()+' '+t('currency')+'</span>':'')+
        '</div>'+
        (out?'':qty>0?
          '<div class="product-actions"><div class="qty-inline"><button onclick="changeQty(\''+p.id+'\',-1)">−</button>'+
          '<input value="'+qty+'" readonly>'+
          '<button onclick="changeQty(\''+p.id+'\',1)">+</button></div></div>':
          '<div class="product-actions">'+
          '<button class="btn-add buy-now" onclick="showProductDetail(\''+p.id+'\')">'+t('buy_now')+'</button></div>'
        )+
      '</div>'+
    '</div>';
  }).join('');
}
function filterProducts(){renderProducts()}

function filterByCategory(el){
  document.querySelectorAll('.cat-btn').forEach(function(b){b.classList.remove('active')});
  el.classList.add('active');
  activeCategory=el.getAttribute('data-cat');
  renderProducts();
}

function buildCategories(){
  try{
    activeCategory='';
    var cats={};
    allProducts.forEach(function(p){
      if(!p)return;
      var key=(currentLang==='ar'?p.category_ar:p.category_en||p.category_ar||'').trim();
      if(!key)return;
      cats[key]=true;
    });
    var keys=Object.keys(cats).sort(function(a,b){return a.localeCompare(b)});
    var bar=document.getElementById('categoryBar');
    if(!bar)return;
    var html='<button class="cat-btn active" data-cat="" onclick="filterByCategory(this)"><span data-i18n="cat_all">'+t('cat_all')+'</span></button>';
    keys.forEach(function(k){
      html+='<button class="cat-btn" data-cat="'+k.replace(/'/g,"\\'")+'" onclick="filterByCategory(this)">'+k+'</button>';
    });
    html+='<select class="sort-select" id="sortSelect" onchange="filterProducts()">'+
      '<option value="default">'+t('sort_default')+'</option>'+
      '<option value="price-asc">'+t('sort_price_asc')+'</option>'+
      '<option value="price-desc">'+t('sort_price_desc')+'</option>'+
      '<option value="name">'+t('sort_name')+'</option>'+
    '</select>';
    bar.innerHTML=html;
  }catch(e){console.error('buildCategories err',e)}
}

function addToCart(id){
  var p=allProducts.find(function(x){return x.id===id});if(!p)return;
  var e=cart.find(function(c){return c.id===id});
  if(e){e.qty++}else{cart.push({id:id,qty:1})}
  saveCart();renderProducts();renderCart();
}
function changeQty(id,d){
  var i=cart.find(function(c){return c.id===id});if(!i)return;
  i.qty+=d;if(i.qty<=0){cart=cart.filter(function(c){return c.id!==id})}
  saveCart();renderProducts();renderCart();
}
function removeFromCart(id){cart=cart.filter(function(c){return c.id!==id});saveCart();renderProducts();renderCart()}

function saveCart(){
  localStorage.setItem(CART_KEY,JSON.stringify(cart));
  var c=cart.reduce(function(s,i){return s+i.qty},0);
  var cc=document.getElementById('cartCount');if(cc)cc.textContent=c;
}

function renderCart(){
  saveCart();
  var c=document.getElementById('cartItems');var f=document.getElementById('cartFooter');
  if(!c)return;
  var cnt=cart.reduce(function(s,i){return s+i.qty},0);
  var cl=document.getElementById('cartCountLabel');if(cl)cl.textContent='('+cnt+')';
  if(!cart.length){c.innerHTML='<div class="cart-empty"><p>'+t('cart_empty')+'</p></div>';if(f)f.style.display='none';return}
  if(f)f.style.display='block';var sub=0;
  c.innerHTML=cart.map(function(item){
    var p=allProducts.find(function(x){return x.id===item.id});if(!p)return'';
    var t=p.price*item.qty;sub+=t;
    var img=p.image1||'<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="%23f0f0f0"><rect width="64" height="64"/></svg>';
    return '<div class="cart-item">'+
      '<img class="cart-item-img" src="'+img+'" alt="">'+
      '<div class="cart-item-info">'+
        '<div class="cart-item-title">'+(currentLang==='ar'?p.title_ar:p.title_en||p.title_ar)+'</div>'+
        '<div class="cart-item-price">'+Number(p.price).toLocaleString()+' '+t('currency')+'</div>'+
        '<div class="cart-item-bottom">'+
          '<div class="qty-inline"><button onclick="changeQty(\''+item.id+'\',-1)">−</button>'+
          '<input value="'+item.qty+'" readonly>'+
          '<button onclick="changeQty(\''+item.id+'\',1)">+</button></div>'+
          '<span class="cart-item-total">'+Number(t).toLocaleString()+' '+t('currency')+'</span>'+
        '</div>'+
        '<div class="cart-item-remove" onclick="removeFromCart(\''+item.id+'\')">'+t('remove')+'</div>'+
      '</div>'+
    '</div>';
  }).join('');
  var cs=document.getElementById('cartSubtotal');if(cs)cs.textContent=sub.toLocaleString()+' '+t('currency');
}

function openCart(){try{document.getElementById('cartOverlay').classList.add('open');document.getElementById('cartDrawer').classList.add('open');document.body.style.overflow='hidden'}catch(e){}}
function closeCart(){try{document.getElementById('cartOverlay').classList.remove('open');document.getElementById('cartDrawer').classList.remove('open');document.body.style.overflow=''}catch(e){}}

function openCheckout(){
  if(!cart.length)return;
  document.getElementById('checkoutModal').classList.add('open');
  document.getElementById('checkoutForm').classList.remove('hidden');
  document.getElementById('orderSuccess').classList.add('hidden');
  populateWilayas();renderOrderSummary();
}
function closeCheckout(){document.getElementById('checkoutModal').classList.remove('open')}

function populateWilayas(){
  var s=document.getElementById('orderWilaya');if(s.options.length>1)return;
  WILAYAS.forEach(function(w){var o=document.createElement('option');o.value=w.code;o.textContent=w.code+' - '+(currentLang==='ar'?w.ar:w.en);s.appendChild(o)});
}

function renderOrderSummary(){
  var h='';var s=0;
  cart.forEach(function(c){var p=allProducts.find(function(x){return x.id===c.id});if(!p)return;var t=p.price*c.qty;s+=t;
    h+='<div class="summary-line"><span>'+(currentLang==='ar'?p.title_ar:p.title_en||p.title_ar)+' × '+c.qty+'</span><span>'+Number(t).toLocaleString()+' '+t('currency')+'</span></div>'});
  h+='<div class="summary-line summary-total"><span>'+t('subtotal')+'</span><span>'+Number(s).toLocaleString()+' '+t('currency')+'</span></div>';
  document.getElementById('orderSummary').innerHTML=h;
}

function submitOrder(e){
  e.preventDefault();
  var n=document.getElementById('orderName').value.trim();
  var p=document.getElementById('orderPhone').value.trim();
  var w=document.getElementById('orderWilaya').value;
  var d=document.getElementById('orderDelivery').value;
  var note=document.getElementById('orderNote').value.trim();
  if(!n||!p||!w)return;
  var wil=WILAYAS.find(function(x){return x.code===w});
  var items=JSON.stringify(cart.map(function(c){var x=allProducts.find(function(p){return p.id===c.id});return{id:c.id,title:x?(currentLang==='ar'?x.title_ar:x.title_en):'',price:x?x.price:0,qty:c.qty}}));
  var sub=cart.reduce(function(s,c){var x=allProducts.find(function(p){return p.id===c.id});return s+(x?x.price*c.qty:0)},0);
  document.getElementById('submitBtn').disabled=true;
  apiCall('order',{
    name:n,phone:p,wilaya_code:w,wilaya_ar:wil?wil.ar:'',wilaya_en:wil?wil.en:'',
    delivery_type:d==='office'?'Office':'Home',items_json:items,subtotal:sub,note:note
  },function(data){
    document.getElementById('submitBtn').disabled=false;
    if(!data||data.error||!data.ok){alert('Error: '+(data?data.error||'Unknown error':'Network error'));return}
    document.getElementById('checkoutForm').classList.add('hidden');
    var sc=document.getElementById('orderSuccess');sc.classList.remove('hidden');
    var id=data.order_id;var wa=storeSettings.phone||'213557543177';
    var msg=encodeURIComponent(t('whatsapp_msg')+' '+id);
    sc.innerHTML='<div class="success-wrap fade-in">'+
      '<div class="success-icon">✓</div>'+
      '<h2>'+t('order_success')+'</h2>'+
      '<p style="color:var(--text2);font-size:.8rem">'+t('order_num')+':</p>'+
      '<div class="success-order">'+id+'</div>'+
      '<p style="color:var(--text2);font-size:.75rem;margin-top:6px">'+t('delivery_note')+'</p>'+
      '<a href="https://wa.me/'+wa+'?text='+msg+'" target="_blank" class="wa-btn">واتساب</a>'+
    '</div>';
    cart=[];saveCart();renderCart();renderProducts();
  });
}

function trackOrder(){
  var id=document.getElementById('trackInput').value.trim();if(!id)return;
  document.getElementById('trackResult').innerHTML='<div class="loading" style="padding:16px 0"><div class="spinner"></div></div>';
  apiCall('track',{order_id:id},function(data){
    if(!data||data.error||!data.found){document.getElementById('trackResult').innerHTML='<div class="track-result"><p style="color:#dc3545;font-weight:600">'+t('track_not_found')+'</p></div>';return}
    var o=data.order;var sk='status_'+(o.status||'pending');
    var it=[];try{it=JSON.parse(o.items_json||'[]')}catch(e){}
    var il=it.map(function(i){return i.title+' × '+i.qty}).join(', ');
    document.getElementById('trackResult').innerHTML='<div class="track-result fade-in">'+
      '<h4>'+t('track_status')+': <span class="track-status '+(o.status||'pending')+'">'+t(sk)+'</span></h4>'+
      '<div class="track-info"><strong>'+t('track_wilaya')+':</strong> '+(currentLang==='ar'?o.wilaya_ar:o.wilaya_en)+'</div>'+
      '<div class="track-info"><strong>'+t('track_delivery')+':</strong> '+(currentLang==='ar'?(o.delivery_type==='Office'?'المكتب':'المنزل'):(o.delivery_type==='Office'?'Office':'Home'))+'</div>'+
      (il?'<div class="track-info"><strong>'+t('track_items')+':</strong> '+il+'</div>':'')+
      '<div class="track-info"><strong>'+t('track_total')+':</strong> '+Number(o.subtotal||0).toLocaleString()+' '+t('currency')+'</div>'+
    '</div>';
  });
}

// ===== PRODUCT DETAIL =====
var CUSTOMER_KEY = 'sk_customer';
function showProductDetail(id){
  var p=allProducts.find(function(x){return x.id===id});if(!p)return;
  document.getElementById('pdProductId').value=id;
  document.getElementById('pdTitle').textContent=currentLang==='ar'?p.title_ar:p.title_en||p.title_ar;
  var ph='<span>'+Number(p.price).toLocaleString()+' '+t('currency')+'</span>';
  if(p.old_price>0)ph+=' <span class="pd-old">'+Number(p.old_price).toLocaleString()+' '+t('currency')+'</span>';
  document.getElementById('pdPrice').innerHTML=ph;
  document.getElementById('pdDesc').textContent=currentLang==='ar'?p.desc_ar:p.desc_en||'';
  var img=p.image1||'';
  document.getElementById('pdImage').innerHTML=img?'<img src="'+img+'" alt="" onerror="this.outerHTML=\'<div style=color:var(--text2);font-size:.85rem;padding:40px;text-align:center>No Image</div>\'">':'<div style="color:var(--text2);font-size:.85rem">No Image</div>';
  var saved=JSON.parse(localStorage.getItem(CUSTOMER_KEY)||'{}');
  document.getElementById('pdName').value=saved.name||'';
  document.getElementById('pdPhone').value=saved.phone||'';
  document.getElementById('pdAddress').value=saved.address||'';
  document.getElementById('pdSuccess').classList.add('hidden');
  document.getElementById('pdForm').classList.remove('hidden');
  document.getElementById('pdSubmit').disabled=false;
  populatePdWilaya();
  document.getElementById('products').classList.add('hidden');
  document.getElementById('productDetailSection').classList.remove('hidden');
  window.scrollTo({top:0,behavior:'smooth'});
}
function hideProductDetail(){
  document.getElementById('products').classList.remove('hidden');
  document.getElementById('productDetailSection').classList.add('hidden');
}
function populatePdWilaya(){
  var s=document.getElementById('pdWilaya');if(s.options.length>1)return;
  WILAYAS.forEach(function(w){var o=document.createElement('option');o.value=w.code;o.textContent=w.code+' - '+(currentLang==='ar'?w.ar:w.en);s.appendChild(o)});
}
function submitProductDetail(e){
  e.preventDefault();
  var n=document.getElementById('pdName').value.trim();
  var ph=document.getElementById('pdPhone').value.trim();
  var w=document.getElementById('pdWilaya').value;
  var d=document.getElementById('pdDelivery').value;
  var addr=document.getElementById('pdAddress').value.trim();
  var note=(document.getElementById('pdNote').value.trim())+' | '+addr;
  if(!n||!ph||!w||!addr)return;
  var pid=document.getElementById('pdProductId').value;
  var prod=allProducts.find(function(x){return x.id===pid});if(!prod)return;
  var wil=WILAYAS.find(function(x){return x.code===w});
  localStorage.setItem(CUSTOMER_KEY,JSON.stringify({name:n,phone:ph,address:addr}));
  var items=JSON.stringify([{id:pid,title:currentLang==='ar'?prod.title_ar:prod.title_en,price:prod.price,qty:1}]);
  document.getElementById('pdSubmit').disabled=true;
  apiCall('order',{
    name:n,phone:ph,wilaya_code:w,wilaya_ar:wil?wil.ar:'',wilaya_en:wil?wil.en:'',
    delivery_type:d==='office'?'Office':'Home',items_json:items,subtotal:prod.price,note:note
  },function(data){
    document.getElementById('pdSubmit').disabled=false;
    if(!data||data.error||!data.ok){alert('Error: '+(data?data.error||'Unknown error':'Network error'));return}
    document.getElementById('pdForm').classList.add('hidden');
    var sc=document.getElementById('pdSuccess');sc.classList.remove('hidden');
    var orderId=data.order_id;var wa=storeSettings.phone||'213557543177';
    var msg=encodeURIComponent(t('whatsapp_msg')+' '+orderId);
    sc.innerHTML='<div class="fade-in">'+
      '<div class="pd-check">✓</div>'+
      '<h3>'+t('order_success')+'</h3>'+
      '<p style="color:var(--text2);font-size:.8rem">'+t('order_num')+':</p>'+
      '<div class="pd-id">'+orderId+'</div>'+
      '<p style="color:var(--text2);font-size:.75rem;margin-top:4px">'+t('delivery_note')+'</p>'+
      '<a href="https://wa.me/'+wa+'?text='+msg+'" target="_blank" class="wa-btn" style="display:inline-flex;margin-top:12px">واتساب</a>'+
      '<br><button class="btn btn-outline btn-sm" style="margin-top:12px" onclick="hideProductDetail()" data-i18n="back_products">← العودة للمنتجات</button>'+
    '</div>';
    document.querySelector('.pd-success .btn-outline').textContent=t('back_products');
  });
}

document.addEventListener('DOMContentLoaded',function(){init()});
</script>
